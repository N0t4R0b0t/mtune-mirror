# nginx front for pkgmirror. Installed as /etc/nginx/nginx.conf.
#   /repos/<arch>/...  -> static pacman repos (fast path for clients)
#   everything else    -> proxied to the pkgmirror-web UI on 127.0.0.1:8080

user  http;
worker_processes  auto;

events {
    worker_connections  1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;
    sendfile        on;
    keepalive_timeout  65;

    server {
        listen       80;
        listen       [::]:80;
        server_name  _;

        # Pacman repos: served straight from disk.
        location /repos/ {
            root   /srv/pkgmirror;
            autoindex on;
        }

        # Monitoring & operations UI + API.
        location / {
            proxy_pass http://127.0.0.1:8080;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            # Server-Sent Events (live build logs) need buffering off + long reads.
            proxy_buffering off;
            proxy_cache off;
            proxy_read_timeout 3600s;
        }
    }
}
